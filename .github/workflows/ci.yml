name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Silk.NET's library loader can't resolve NuGet-packaged native libraries
      # under `dotnet test` on Linux (DependencyContext.Default points to the test
      # host, not the test assembly). Expose them via LD_LIBRARY_PATH instead.
      - name: Setup native library path (Linux)
        if: runner.os == 'Linux'
        run: |
          dotnet restore VeldridSilk.slnx
          NATIVE_PATHS=$(find ~/.nuget/packages -path "*/runtimes/linux-x64/native" -type d 2>/dev/null | tr '\n' ':')
          echo "LD_LIBRARY_PATH=${NATIVE_PATHS}${LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Build
        run: dotnet build VeldridSilk.slnx -c Release

      - name: Run SPIRV tests
        run: dotnet test tests/Veldrid.SPIRV.Tests/Veldrid.SPIRV.Tests.csproj -c Release

      - name: Run non-GPU tests
        run: dotnet test tests/Veldrid.Tests/Veldrid.Tests.csproj -c Release -p:ExcludeGPU=true
