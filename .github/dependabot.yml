version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    groups:
      xunit:
        patterns:
          - "xunit*"
          - "Xunit*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: main
